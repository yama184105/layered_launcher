name: Build debug APK

on:
  push:
    branches:
      - master
      - main
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-debug-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.41.7 stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: flutter --version
        run: flutter --version

      - name: flutter pub get
        run: flutter pub get

      - name: flutter build apk --debug
        run: flutter build apk --debug

      - name: Rename APK with short SHA
        id: rename
        run: |
          set -eu
          SRC="build/app/outputs/flutter-apk/app-debug.apk"
          test -f "$SRC"
          SHORT="${GITHUB_SHA::7}"
          OUT="layered_launcher-debug-${SHORT}.apk"
          cp "$SRC" "$OUT"
          ls -lh "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Compose release notes
        id: notes
        run: |
          set -eu
          BUILD_TIME="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          {
            echo "## 最新デバッグ APK"
            echo
            echo "- **コミット**: \`${GITHUB_SHA}\`"
            echo "- **ブランチ**: \`${GITHUB_REF_NAME}\`"
            echo "- **ビルド日時**: ${BUILD_TIME}"
            echo
            echo "### スマホへのインストール手順"
            echo
            echo "1. 下の \`${{ steps.rename.outputs.apk }}\` をタップしてダウンロード"
            echo "2. ダウンロード通知をタップ"
            echo "3. 「不明なアプリのインストール」を Chrome に許可"
            echo "4. インストール"
          } > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Publish to rolling 'debug-latest' release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          gh release delete debug-latest \
            --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh release create debug-latest \
            "${{ steps.rename.outputs.apk }}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Debug APK (${{ steps.rename.outputs.short_sha }})" \
            --prerelease \
            --notes-file /tmp/release-notes.md
