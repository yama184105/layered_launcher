name: Build release APK + AAB

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.41.7 stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Restore release.jks from secret
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -eu
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          mkdir -p android
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/release.jks
          ls -lh android/release.jks

      - name: Write key.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -eu
          {
            echo "storeFile=release.jks"
            echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "keyPassword=${ANDROID_KEY_PASSWORD}"
          } > android/key.properties

      - name: flutter pub get
        run: flutter pub get

      - name: flutter build apk --release
        run: flutter build apk --release

      - name: flutter build appbundle --release
        run: flutter build appbundle --release

      - name: Rename outputs with short SHA
        id: rename
        run: |
          set -eu
          APK_SRC="build/app/outputs/flutter-apk/app-release.apk"
          AAB_SRC="build/app/outputs/bundle/release/app-release.aab"
          test -f "$APK_SRC"
          test -f "$AAB_SRC"
          SHORT="${GITHUB_SHA::7}"
          APK_OUT="layered_launcher-release-${SHORT}.apk"
          AAB_OUT="layered_launcher-release-${SHORT}.aab"
          cp "$APK_SRC" "$APK_OUT"
          cp "$AAB_SRC" "$AAB_OUT"
          ls -lh "$APK_OUT" "$AAB_OUT"
          echo "apk=$APK_OUT" >> "$GITHUB_OUTPUT"
          echo "aab=$AAB_OUT" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Compose release notes
        id: notes
        run: |
          set -eu
          BUILD_TIME="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          {
            echo "## 最新リリースビルド (署名済)"
            echo
            echo "- **コミット**: \`${GITHUB_SHA}\`"
            echo "- **ブランチ**: \`${GITHUB_REF_NAME}\`"
            echo "- **ビルド日時**: ${BUILD_TIME}"
            echo
            echo "### スマホへのインストール (APK)"
            echo
            echo "1. \`${{ steps.rename.outputs.apk }}\` をタップしてダウンロード"
            echo "2. ダウンロード通知をタップ → 「不明なアプリのインストール」を Chrome に許可 → インストール"
            echo
            echo "### Play Console アップロード (AAB)"
            echo
            echo "\`${{ steps.rename.outputs.aab }}\` を Play Console の内部テスト / クローズドテストにアップロードしてください。"
            echo
            echo "### 注意"
            echo
            echo "applicationId が変わる前の旧アプリがインストールされている場合は、先にアンインストールしてからインストールしてください (debug ビルドからの移行時など)。"
          } > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Publish to rolling 'release-latest' release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          gh release delete release-latest \
            --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh release create release-latest \
            "${{ steps.rename.outputs.apk }}" \
            "${{ steps.rename.outputs.aab }}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Release Build (${{ steps.rename.outputs.short_sha }})" \
            --notes-file /tmp/release-notes.md

      - name: Cleanup signing files
        if: always()
        run: |
          rm -f android/release.jks android/key.properties
